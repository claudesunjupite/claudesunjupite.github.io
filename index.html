<!DOCTYPE html>
<html lang="th">
<head>

<title>🔧 ระบบเบิกจ่ายอะไหล่ v8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun','Segoe UI',sans-serif;font-size:14px;background:#f3f4f6;color:#1f2937;min-height:100vh}
button{cursor:pointer;font-family:inherit;font-size:14px;border:none;transition:all .15s}
input,select,textarea{font-family:inherit;font-size:14px;outline:none}
table{border-collapse:collapse;width:100%}
.page-wrap{max-width:1100px;margin:0 auto;padding:0 0 60px}
.topbar{background:linear-gradient(135deg,#1d4ed8,#4f46e5);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-title{font-weight:800;font-size:15px}
.topbar-sub{font-size:11px;color:#bfdbfe;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.alert-bar{padding:6px 16px 0}
.alert-btn{display:block;width:100%;text-align:left;font-size:12px;padding:7px 12px;border-radius:8px;border:1px solid;margin-bottom:4px;font-weight:600;background:none;cursor:pointer}
.alert-yellow{background:#fefce8;border-color:#fde047;color:#854d0e}
.alert-blue{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.alert-orange{background:#fff7ed;border-color:#fdba74;color:#9a3412}
.alert-red{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 16px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x}
.nav::-webkit-scrollbar{display:none}
.nav-inner{display:inline-flex;gap:4px;padding:8px 0}
.nav-btn{position:relative;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;background:none;color:#6b7280;white-space:nowrap}
.nav-btn.active{background:#2563eb;color:#fff;box-shadow:0 1px 4px rgba(37,99,235,.4)}
.nav-btn:not(.active):hover{background:#f3f4f6}
.nav-badge{position:absolute;top:-3px;right:-3px;background:#ef4444;color:#fff;font-size:9px;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-weight:700}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px}
@media(max-width:600px){.summary-grid{grid-template-columns:repeat(2,1fr)}}
.summary-card{border-radius:12px;padding:12px;border:1px solid rgba(0,0,0,.08)}
.summary-card .num{font-size:28px;font-weight:900;line-height:1}
.summary-card .lbl{font-size:11px;font-weight:600;margin-top:2px}
.s-yellow{background:#fefce8;color:#854d0e}.s-orange{background:#fff7ed;color:#9a3412}
.s-blue{background:#eff6ff;color:#1e40af}.s-green{background:#f0fdf4;color:#166534}.s-red{background:#fef2f2;color:#991b1b}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:12px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:12px 16px;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.card-hdr-title{font-weight:700;color:#374151}
.section{padding:16px;display:flex;flex-direction:column;gap:12px}
.field-label{display:block;font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px}
.input{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px 12px;font-size:13px;transition:border .15s}
.input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.input-sm{padding:6px 8px;font-size:12px}
.input-mono{font-family:monospace}
.input-readonly{background:#f9fafb;color:#6b7280}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
.btn{padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;border:1px solid transparent}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-orange{background:#ea580c;color:#fff}.btn-orange:hover{background:#c2410c}
.btn-gray{background:#6b7280;color:#fff}.btn-gray:hover{background:#4b5563}
.btn-outline{background:none;border:1px solid #d1d5db;color:#374151}.btn-outline:hover{background:#f9fafb}
.btn-outline-blue{background:none;border:1px solid #93c5fd;color:#1d4ed8}.btn-outline-blue:hover{background:#eff6ff}
.btn-outline-green{background:none;border:1px solid #86efac;color:#15803d}.btn-outline-green:hover{background:#f0fdf4}
.btn-outline-orange{background:none;border:1px solid #fdba74;color:#c2410c}.btn-outline-orange:hover{background:#fff7ed}
.btn-outline-red{background:none;border:1px solid #fca5a5;color:#dc2626}.btn-outline-red:hover{background:#fef2f2}
.btn-outline-purple{background:none;border:1px solid #c4b5fd;color:#6d28d9}.btn-outline-purple:hover{background:#f5f3ff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-full{width:100%}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700}
.bg-green{background:#dcfce7;color:#166534}.bg-yellow{background:#fef9c3;color:#854d0e}
.bg-red{background:#fee2e2;color:#991b1b}.bg-blue{background:#dbeafe;color:#1e40af}
.bg-indigo{background:#e0e7ff;color:#3730a3}.bg-orange{background:#ffedd5;color:#9a3412}
.bg-purple{background:#f3e8ff;color:#6b21a8}.bg-gray{background:#f3f4f6;color:#6b7280}
.bg-rose{background:#ffe4e6;color:#9f1239}.bg-teal{background:#ccfbf1;color:#0f766e}
.bg-amber{background:#fef3c7;color:#92400e}
.tbl th{background:#f9fafb;padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;border-bottom:1px solid #e5e7eb}
.tbl td{padding:8px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle;font-size:12px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#f9fafb}
.right{text-align:right}
.list-item{padding:12px 16px;border-bottom:1px solid #f3f4f6;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
.list-item:last-child{border-bottom:none}
.list-item-clickable{cursor:pointer}.list-item-clickable:hover{background:#f9fafb}
.expand-panel{padding:12px 16px;background:#f9fafb;border-top:1px solid #f3f4f6}
.err{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 12px;color:#dc2626;font-size:12px}
.succ{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:10px 12px;color:#16a34a;font-size:12px}
.info-box{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600}
.info-blue{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.info-orange{background:#fff7ed;color:#c2410c;border:1px solid #fdba74}
.info-purple{background:#f5f3ff;color:#6d28d9;border:1px solid #ddd6fe}
.info-red{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
.info-green{background:#f0fdf4;color:#15803d;border:1px solid #86efac}
.info-amber{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.line-box{border:1px solid #e5e7eb;border-radius:10px;padding:10px;background:#f9fafb;margin-bottom:6px}
.line-box-hdr{display:flex;justify-content:space-between;margin-bottom:6px}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:540px;padding:24px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;color:#1f2937;margin-bottom:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.login-wrap{min-height:100vh;background:linear-gradient(135deg,#1d4ed8,#4f46e5);display:flex;align-items:center;justify-content:center;padding:16px}
.login-card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:400px;padding:32px}
.login-icon{font-size:48px;text-align:center;margin-bottom:8px}
.login-title{font-size:20px;font-weight:900;text-align:center;color:#1f2937}
.login-sub{font-size:11px;color:#9ca3af;text-align:center;margin-bottom:20px}
.role-btn{width:100%;border:2px solid #e5e7eb;border-radius:12px;padding:9px 14px;text-align:left;display:flex;align-items:center;gap:10px;background:#fff;margin-bottom:6px;transition:all .15s}
.role-btn.selected{border-color:#2563eb;background:#eff6ff}
.role-btn:hover:not(.selected){border-color:#d1d5db}
.role-btn-icon{font-size:20px}
.role-btn-name{font-weight:700;font-size:13px;color:#1f2937}
.role-btn-desc{font-size:10px;color:#9ca3af}
.job-detail{background:#f0f9ff;border-top:1px solid #bae6fd;padding:12px 16px}
.stock-crit{background:#fef2f2 !important}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.text-xs{font-size:11px}.text-sm{font-size:12px}.text-gray{color:#9ca3af}.text-red{color:#dc2626}
.font-mono{font-family:monospace}.font-bold{font-weight:700}
.pin-input{letter-spacing:6px;font-size:20px;text-align:center;font-weight:900;width:140px}
.user-disabled{opacity:.5;background:#f9fafb}
.stock-badge-warn{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;background:#fee2e2;color:#991b1b}
.stock-badge-ok{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;background:#dcfce7;color:#166534}
/* ── Searchable Part Selector ─────────────────────────────── */
.part-search-wrap{position:relative}
.part-search-input{width:100%;padding:7px 32px 7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;background:#fff;box-sizing:border-box}
.part-search-input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.part-search-input.has-value{border-color:#10b981;background:#f0fdf4}
.part-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;color:#9ca3af;font-size:16px;line-height:1;padding:2px 4px}
.part-search-clear:hover{color:#ef4444}
.part-dropdown{position:absolute;z-index:200;left:0;right:0;top:calc(100% + 2px);background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:260px;overflow-y:auto}
.part-option{padding:8px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6;display:flex;gap:10px;align-items:center}
.part-option:last-child{border-bottom:none}
.part-option:hover{background:#eff6ff}
.part-option .po-code{font-family:monospace;font-size:11px;color:#6b7280;white-space:nowrap}
.part-option .po-name{font-size:13px;flex:1}
.part-option .po-stock{font-size:11px;color:#6b7280;white-space:nowrap}
.part-option .po-warn{color:#dc2626;font-weight:700}
.photo-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.photo-thumb{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #e5e7eb;cursor:pointer}
.photo-add{width:80px;height:80px;border:2px dashed #d1d5db;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#9ca3af;font-size:28px;background:#f9fafb;flex-shrink:0}
.photo-add:hover{border-color:#3b82f6;color:#3b82f6;background:#eff6ff}
.sfw{position:relative;display:block;width:100%}
.sfw-btn{display:flex;align-items:center;gap:6px;justify-content:space-between;cursor:pointer;width:100%;text-align:left}
.sfw-drop{position:absolute;right:0;top:calc(100% + 4px);background:#fff;border:1px solid #d1d5db;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:300;min-width:160px;overflow:hidden}
.sfw-opt{padding:10px 14px;cursor:pointer;font-size:13px;white-space:nowrap;border-bottom:1px solid #f3f4f6}
.sfw-opt:last-child{border-bottom:none}
.sfw-opt:hover,.sfw-opt.active{background:#eff6ff}
.sfw-opt.active{font-weight:700;color:#2563eb}
.part-selected-tag{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:5px 10px;font-size:12px}
.part-selected-tag .pt-code{font-family:monospace;color:#1d4ed8;font-weight:700}
.part-selected-tag .pt-name{color:#374151}
/* ── Pagination ───────────────────────────────────────────── */
.pager{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:10px 0 4px}
.pager-btn{padding:4px 12px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;font-size:12px}
.pager-btn:hover:not(:disabled){background:#eff6ff;border-color:#3b82f6}
.pager-btn:disabled{opacity:.4;cursor:default}
.pager-info{font-size:12px;color:#6b7280}
</style>

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
let _lastPendingN=-1, _lastApprovedN=-1, _lastIssuedN=-1, _lastPreparingN=-1;

function requestNotifPerm(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}

function notify(title, body){
  if(!('Notification' in window)||Notification.permission!=='granted') return;
  new Notification(title,{body,icon:'https://cdn-icons-png.flaticon.com/512/190/190406.png'});
}

function checkNotify(){
  if(!S.user) return;
  const role=S.user.role;
  const uname=S.user.name;

  // 1) approver/admin: แจ้งเมื่อมีใบเบิกรออนุมัติใหม่
  if(role==='approver'||role==='admin'){
    const pN=S.reqs.filter(r=>r.status==='pending').length;
    if(_lastPendingN>=0 && pN>_lastPendingN)
      notify('📋 มีใบเบิกรออนุมัติใหม่',`รออนุมัติ ${pN} รายการ — กรุณาตรวจสอบ`);
    _lastPendingN=pN;
  }

  // 1.5) approver/admin: แจ้งเมื่อสโตร์รับทราบและเริ่มจัดของแล้ว
  if(role==='approver'||role==='admin'){
    const prN=S.reqs.filter(r=>r.status==='preparing').length;
    if(_lastPendingN>=0 && prN>(_lastPreparingN||0))
      notify('📦 สโตร์เริ่มจัดของแล้ว',`กำลังจัดของ ${prN} รายการ`);
    _lastPreparingN=prN;
  }

  // 2) store/admin: แจ้งเมื่อผู้อนุมัติอนุมัติแล้ว รอจัดของ
  if(role==='store'||role==='admin'){
    const aN=S.reqs.filter(r=>r.status==='approved').length;
    if(_lastApprovedN>=0 && aN>_lastApprovedN)
      notify('📦 ได้รับอนุญาตให้จัดของแล้ว',`มีใบเบิกอนุมัติรอจัดของ ${aN} รายการ`);
    _lastApprovedN=aN;
  }

  // 3) user: แจ้งเมื่อสโตร์จัดของเสร็จ (issued) เฉพาะใบเบิกของตัวเอง
  if(role==='user'||role==='approver'){
    const iN=S.reqs.filter(r=>r.status==='issued'&&(r.createdBy===uname||r.createdByName===uname)).length;
    if(_lastIssuedN>=0 && iN>_lastIssuedN)
      notify('✅ สโตร์จัดของเสร็จแล้ว',`ใบเบิกของคุณถูกจ่ายแล้ว ${iN} รายการ — รับสินค้าได้เลย`);
    _lastIssuedN=iN;
  }
}

function compressImage(file,maxW=800,quality=0.65){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const c=document.createElement('canvas');
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',quality));
    };
    img.src=url;
  });
}

function downloadXLS(filename,htmlTable){
  const tmpl=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"></head><body>${htmlTable}</body></html>`;
  const blob=new Blob(['\ufeff'+tmpl],{type:'application/vnd.ms-excel'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

function renderSettings(){

  const tabs=[{key:'users',label:'👥 ผู้ใช้'},{key:'locations',label:'📍 ตำแหน่งซ่อม'},{key:'customers',label:'🏢 ลูกค้า'},{key:'machines',label:'🏗️ เครื่องจักร'},{key:'company',label:'🏢 บริษัท'}];
  if(isAdmin) tabs.push({key:'danger',label:'⚠️ รีเซ็ต'});
  const tabBar=`<div class="row gap-1" style="margin-bottom:12px">
    ${tabs.map(tb=>`<button class="btn btn-sm ${t===tb.key?(tb.key==='danger'?'btn-danger':'btn-primary'):'btn-outline'}" data-action="settings-tab" data-val="${tb.key}">${tb.label}</button>`).join('')}

  if(t==='danger'&&isAdmin) return `<div class="section">${tabBar}${renderDangerPage()}</div>`;
  return '';
}

function renderStockFilter(){
  const opts=[
    {v:'all',l:'ทั้งหมด'},
    {v:'low',l:'⚠️ ต่ำกว่าขั้นต่ำ'},
    {v:'out',l:'❌ หมด'},
    {v:'ok',l:'✅ ปกติ'},
  ];
  const cur=opts.find(o=>o.v===S.filterStockStatus)||opts[0];
  const drop=S._stockStatusOpen?`<div class="sfw-drop">${
    opts.map(o=>`<div class="sfw-opt${o.v===S.filterStockStatus?' active':''}" data-action="set-stock-filter" data-val="${o.v}">${o.l}</div>`).join('')
  }</div>`:'';
  return `<div class="sfw"><button class="input input-sm sfw-btn" data-action="toggle-stock-filter">${cur.l} <span>▾</span></button>${drop}</div>`;
}

function renderAdminStockList(){
  const q=(S.searchStock||'').toLowerCase();
  let all=S.parts.filter(p=>!q||p.name.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));
  if(S.filterStockStatus==='low') all=all.filter(p=>p.stock<(p.minStock||STOCK_WARN_LEVEL)&&p.stock>0);
  if(S.filterStockStatus==='out') all=all.filter(p=>p.stock===0);
  if(S.filterStockStatus==='ok')  all=all.filter(p=>p.stock>=(p.minStock||STOCK_WARN_LEVEL));
  const editId=S._editPartId;
  // Keep edit row always visible even if on a different page
  const page=editId?0:Math.min(S.adminStockPage||0,Math.max(0,Math.ceil(all.length/PAGE_SIZE)-1));
  const list=editId?all:all.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const rows=list.map(p=>{
    const w=p.minStock||STOCK_WARN_LEVEL;
    if(editId===p.id){
      return `<tr style="background:#fffbeb">
        <td><input class="input input-sm input-mono" id="ep-code-${p.id}" value="${esc(p.code)}" style="width:90px"></td>
        <td><input class="input input-sm" id="ep-name-${p.id}" value="${esc(p.name)}"></td>
        <td><input class="input input-sm" id="ep-unit-${p.id}" value="${esc(p.unit)}" style="width:60px"></td>
        <td class="right"><input type="number" class="input input-sm right" id="ep-min-${p.id}" value="${w}" style="width:60px" min="0"></td>
        <td class="right">${p.stock}</td>
        <td>${stockBadge(p.stock,w)}</td>
        <td><div class="row gap-1">
          <button class="btn btn-sm btn-success" data-action="save-edit-part" data-id="${p.id}">💾 บันทึก</button>
          <button class="btn btn-sm btn-outline" data-action="cancel-edit-part">ยกเลิก</button>
        </div></td>
      </tr>`;
    }
    return `<tr class="${p.stock<w?'stock-crit':''}">
      <td class="font-mono" style="font-size:11px">${esc(p.code)}</td>
      <td>${esc(p.name)}</td><td>${esc(p.unit)}</td>
      <td class="right">${w}</td>
      <td class="right">${p.stock}</td>
      <td>${stockBadge(p.stock,w)}</td>
      <td><div class="row gap-1">
        <button class="btn btn-sm btn-outline-blue" data-action="edit-part" data-id="${p.id}">✏️ แก้ไข</button>
        <button class="btn btn-sm btn-outline-red" data-action="del-part" data-id="${p.id}">ลบ</button>
      </div></td>
    </tr>`;
  }).join('');
  return `<div class="card">
    <div class="card-hdr">
      <span class="card-hdr-title">📦 รายการสินค้าในสต็อก (${S.parts.length} รายการ)</span>
      <div class="row gap-1">
        <input class="input input-sm" id="stock-search" placeholder="🔍 ค้นหา..." style="width:160px" value="${esc(S.searchStock||'')}">
        ${renderStockFilter()}
      </div>
    </div>
    <div style="overflow-x:auto">
    <table class="tbl"><thead><tr>
      <th>รหัส</th><th>ชื่อสินค้า</th><th>หน่วย</th>
      <th class="right">ขั้นต่ำ</th><th class="right">คงเหลือ</th><th>สถานะ</th><th>จัดการ</th>
    </tr></thead>
    <tbody>${rows||'<tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:16px">ไม่พบรายการ</td></tr>'}
    ${editId?'':pager(all.length,page,'adminStockPage',7)}</tbody>
    </table></div>
  </div>`;
}

function renderStoreStock(){
  const q=(S.searchStock||'').toLowerCase();
  let all=S.parts.filter(p=>!q||p.name.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));
  if(S.filterStockStatus==='low') all=all.filter(p=>p.stock<(p.minStock||STOCK_WARN_LEVEL)&&p.stock>0);
  if(S.filterStockStatus==='out') all=all.filter(p=>p.stock===0);
  if(S.filterStockStatus==='ok')  all=all.filter(p=>p.stock>=(p.minStock||STOCK_WARN_LEVEL));
  const lowItems=S.parts.filter(p=>p.stock<(p.minStock||STOCK_WARN_LEVEL));
  const page=Math.min(S.stockPage||0,Math.max(0,Math.ceil(all.length/PAGE_SIZE)-1));
  const list=all.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);
  const rows=list.map(p=>{
    const w=p.minStock||STOCK_WARN_LEVEL;
    return `<tr class="${p.stock<w?'stock-crit':''}">
      <td class="font-mono" style="font-size:11px">${esc(p.code)}</td>
      <td>${esc(p.name)}</td><td>${esc(p.unit)}</td>
      <td class="right">${w}</td>
      <td class="right">${p.stock}</td>
      <td>${stockBadge(p.stock,w)}</td>

  return `<div class="section">
    ${lowItems.length>0?`<div class="card">
      <div class="card-hdr">

      <tbody>${lowItems.map(p=>{const w=p.minStock||STOCK_WARN_LEVEL;return`<tr class="stock-crit">
        <td class="font-mono" style="font-size:11px">${esc(p.code)}</td>
        <td>${esc(p.name)}</td><td>${esc(p.unit)}</td>
        <td class="right">${w}</td><td class="right">${p.stock}</td>
        <td class="right font-bold" style="color:#dc2626">-${Math.max(0,w-p.stock)}</td>
      </tr>`;}).join('')}</tbody>
      </table>
    </div>`:''}
    <div class="card">

// user stock view (read-only simple)
const PAGE_SIZE=50;
function pager(total, page, stateKey, colSpan){
  if(total<=PAGE_SIZE) return '';
  const pages=Math.ceil(total/PAGE_SIZE);
  const from=page*PAGE_SIZE+1, to=Math.min((page+1)*PAGE_SIZE,total);
  return `<tr><td colspan="${colSpan}" style="background:#f9fafb;padding:6px 12px">
    <div class="pager">
      <button class="pager-btn" data-action="page" data-key="${stateKey}" data-val="0" ${page===0?'disabled':''}>«</button>
      <button class="pager-btn" data-action="page" data-key="${stateKey}" data-val="${page-1}" ${page===0?'disabled':''}>‹ ก่อนหน้า</button>
      <span class="pager-info">แสดง ${from}–${to} จาก ${total} รายการ (หน้า ${page+1}/${pages})</span>
      <button class="pager-btn" data-action="page" data-key="${stateKey}" data-val="${page+1}" ${page>=pages-1?'disabled':''}>ถัดไป ›</button>
      <button class="pager-btn" data-action="page" data-key="${stateKey}" data-val="${pages-1}" ${page>=pages-1?'disabled':''}>»</button>
    </div>
  </td></tr>`;
}

// ─── SEARCHABLE PART SELECTOR ─────────────────────────────────────────────────
function renderPartSearch(lid, selectedPartId){
  const lidStr=String(lid);
  const selected=selectedPartId?S.parts.find(p=>p.id===selectedPartId||p.id===Number(selectedPartId)):null;
  const q=(S._lineSearch[lidStr]||'').toLowerCase();
  const isOpen=S._lineDropOpen===lidStr && q.length>0;

  // Filter parts: match code OR name, partial anywhere
  const matches=isOpen?S.parts.filter(p=>{
    const code=(p.code||'').toLowerCase();
    const name=(p.name||'').toLowerCase();
    return code.includes(q)||name.includes(q);
  }).slice(0,30):[];  // cap at 30 results

  const dropHtml=isOpen?`<div class="part-dropdown">
    ${matches.length===0
      ?`<div style="padding:12px 16px;color:#9ca3af;font-size:12px;text-align:center">ไม่พบสินค้าที่ตรงกับ "${esc(q)}"</div>`
      :matches.map(p=>{
          const warn=p.stock<(p.minStock||STOCK_WARN_LEVEL);
          // Highlight matching part of code and name
          const hCode=esc(p.code).replace(new RegExp(esc(q),'gi'),m=>`<mark style="background:#fef08a;padding:0">${m}</mark>`);
          const hName=esc(p.name).replace(new RegExp(esc(q),'gi'),m=>`<mark style="background:#fef08a;padding:0">${m}</mark>`);
          return `<div class="part-option" data-action="select-part" data-lid="${lid}" data-pid="${p.id}">
            <span class="po-code">${hCode}</span>
            <span class="po-name">${hName}</span>
            <span class="po-stock ${warn?'po-warn':''}">${warn?'⚠️ ':''}${p.stock} ${esc(p.unit)}</span>
          </div>`;
        }).join('')}
  </div>`:'';

  if(selected){
    // Show selected tag with clear button
    const warn=selected.stock<(selected.minStock||STOCK_WARN_LEVEL);
    return `<div class="part-search-wrap">
      <div class="part-selected-tag">
        <span class="pt-code">${esc(selected.code)}</span>
        <span class="pt-name">${esc(selected.name)}</span>
        <span style="color:#6b7280;font-size:11px">${warn?`<span style="color:#dc2626">⚠️ เหลือ ${selected.stock}</span>`:`เหลือ ${selected.stock} ${esc(selected.unit)}`}</span>
        <span class="part-search-clear" data-action="clear-part" data-lid="${lid}" title="เลือกใหม่">✕</span>
      </div>
    </div>`;
  }

  return `<div class="part-search-wrap">
    <input class="part-search-input${q?' has-value':''}" type="text"
      placeholder="พิมพ์รหัส (เช่น 001) หรือชื่อสินค้า..."
      data-action="part-search-input" data-lid="${lid}"
      value="${esc(S._lineSearch[lidStr]||'')}"
      autocomplete="off">
    ${q?`<span class="part-search-clear" data-action="clear-part-search" data-lid="${lid}" title="ล้าง">✕</span>`:''}
    ${dropHtml}
  </div>`;
}

  const rets=S.returns.filter(x=>x.reqId===r.id);
  const cust=S.customers.find(c=>c.id===job?.customerId);
  const isApprover=S.user?.role==='approver';
  let actions='';
  if(mode==='pending'){
    actions=`<div class="row" style="margin-top:10px;gap:6px">
      <button class="btn btn-success" style="flex:1" data-action="approve-req" data-id="${r.id}">✅ อนุมัติ</button>

// ─── STORE HISTORY ────────────────────────────────────────────────────────────
function renderStoreHistory(){
  const ft=S.storeHistFt||'all';
  const issued=S.reqs.filter(r=>r.status==='issued').slice().sort((a,b)=>(b.issuedAt||b.createdAt).localeCompare(a.issuedAt||a.createdAt));

  // Build filter
  const fDate=S.storeHistDate||'';
  const fFrom=S.storeHistFrom||'';
  const fTo  =S.storeHistTo  ||'';
  const fJob =S.storeHistJob ||'all';
  const fQ   =(S.storeHistQ  ||'').toLowerCase();

  let rows=issued;
  if(ft==='date'   && fDate) rows=rows.filter(r=>isoDay(r.issuedAt||r.createdAt)===fDate);
  if(ft==='range'  && (fFrom||fTo)) rows=rows.filter(r=>{
    const d=isoDay(r.issuedAt||r.createdAt);
    if(fFrom&&d<fFrom) return false;
    if(fTo  &&d>fTo  ) return false;
    return true;
  });
  if(fJob!=='all') rows=rows.filter(r=>r.jobId===fJob);
  if(fQ) rows=rows.filter(r=>{
    const job=S.jobs.find(j=>j.id===r.jobId);
    const cust=S.customers.find(c=>c.id===job?.customerId);
    return r.id.toLowerCase().includes(fQ)||
           (r.createdBy||'').toLowerCase().includes(fQ)||
           (job?.code||'').toLowerCase().includes(fQ)||
           (cust?.name||'').toLowerCase().includes(fQ)||
           r.items.some(it=>{const p=S.parts.find(x=>x.id===it.partId);return(p?.name||'').toLowerCase().includes(fQ)||(p?.code||'').toLowerCase().includes(fQ);});
  });

  const totalItems=rows.reduce((s,r)=>s+r.items.reduce((ss,it)=>ss+it.qty,0),0);
  const totalRets =rows.reduce((s,r)=>s+S.returns.filter(x=>x.reqId===r.id&&x.status==='completed_return').reduce((ss,rt)=>ss+rt.qty,0),0);

  const filterBar=`<div class="row gap-1" style="flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">
    <div><label class="field-label">กรองตาม</label>
      <select class="input input-sm" style="width:150px" data-action="store-hist-ft">
        <option value="all"   ${ft==='all'   ?' selected':''}>📋 ทั้งหมด</option>
        <option value="date"  ${ft==='date'  ?' selected':''}>📅 วันที่เฉพาะ</option>
        <option value="range" ${ft==='range' ?' selected':''}>📆 ช่วงเวลา</option>
        <option value="job"   ${ft==='job'   ?' selected':''}>🗂️ Job</option>
      </select></div>
    ${ft==='date'?`<div><label class="field-label">วันที่</label><input type="date" class="input input-sm" id="sh-date" style="width:160px" value="${esc(fDate)}"></div>`:''}
    ${ft==='range'?`<div><label class="field-label">จากวันที่</label><input type="date" class="input input-sm" id="sh-from" style="width:150px" value="${esc(fFrom)}"></div>
      <div><label class="field-label">ถึงวันที่</label><input type="date" class="input input-sm" id="sh-to" style="width:150px" value="${esc(fTo)}"></div>`:''}
    ${ft==='job'?`<div><label class="field-label">Job</label>
      <select class="input input-sm" style="width:220px" data-action="store-hist-job">
        <option value="all">— ทุก Job —</option>
        ${S.jobs.map(j=>`<option value="${j.id}"${fJob===j.id?' selected':''}>${esc(j.code)}${j.status==='closed'?' (ปิดแล้ว)':''}</option>`).join('')}
      </select></div>`:''}
    <div><label class="field-label">ค้นหา</label><input class="input input-sm" id="sh-q" style="width:200px" placeholder="ใบเบิก / ผู้เบิก / สินค้า..." value="${esc(S.storeHistQ||'')}"></div>
    <div style="padding-bottom:1px"><button class="btn btn-primary btn-sm" data-action="apply-store-hist">🔍 แสดง</button></div>
  </div>`;

  // Table rows — expand per req
  const tblRows=rows.map(r=>{
    const job=S.jobs.find(j=>j.id===r.jobId);
    const cust=S.customers.find(c=>c.id===job?.customerId);
    const exp=S.expanded['sh_'+r.id];
    const retsForReq=S.returns.filter(x=>x.reqId===r.id&&x.status==='completed_return');
    const retQty=retsForReq.reduce((s,x)=>s+x.qty,0);
    const itemRows=r.items.map(it=>{
      const p=S.parts.find(x=>x.id===it.partId);
      return `<tr style="background:#f9fafb">
        <td colspan="2"></td>
        <td class="font-mono" style="font-size:11px;padding-left:24px">↳ ${esc(p?.code||'—')}</td>
        <td>${esc(p?.name||'—')}</td>
        <td>${esc(it.location||'—')}</td>
        <td class="right font-bold">${it.qty}</td>
        <td>${esc(p?.unit||'')}</td>
        <td></td>
      </tr>`;
    }).join('');
    const photoRow=exp&&(r.photos||[]).length>0?`<tr><td colspan="8" style="background:#f9fafb;padding:8px 12px">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${(r.photos||[]).map((p,i)=>`<img src="${p}" class="photo-thumb" data-action="view-photo" data-rid="${r.id}" data-idx="${i}" title="คลิกดูรูปเต็ม">`).join('')}
      </div></td></tr>`:'';
    return `<tr class="list-item-clickable" data-action="toggle-sh" data-id="${r.id}" style="cursor:pointer">
      <td style="white-space:nowrap;font-size:11px">${fmtDT(r.issuedAt||r.createdAt)}</td>
      <td class="font-mono" style="font-size:11px">${esc(r.id)}</td>
      <td>${esc(r.createdBy)}${r.dept?' <span style="color:#9ca3af;font-size:10px">('+esc(r.dept)+')</span>':''}</td>
      <td>${job?`<span class="badge bg-indigo" style="font-size:10px">${esc(job.code)}</span>`:'—'} ${cust?`<span class="badge bg-rose" style="font-size:10px">${esc(cust.name)}</span>`:''}</td>
      <td>${job?.machineType?`<span style="font-size:11px">${esc(job.machineType)}</span>`:'—'}</td>
      <td class="right">${r.items.reduce((s,it)=>s+it.qty,0)}</td>
      <td>${retQty>0?`<span style="color:#16a34a;font-size:11px">+${retQty} คืน</span>`:'—'}</td>
      <td style="color:#9ca3af;font-size:14px">${exp?'▲':'▼'}</td>
    </tr>${exp?itemRows:''}${photoRow}`;
  }).join('');

  const tableHtml=rows.length===0
    ?`<p style="text-align:center;color:#9ca3af;padding:24px 0">ไม่มีข้อมูลที่ตรงกับเงื่อนไข</p>`
    :`<div style="overflow-x:auto"><table class="tbl">
      <thead><tr>
        <th>วันที่จ่าย</th><th>เลขใบเบิก</th><th>ผู้เบิก</th><th>Job / ลูกค้า</th><th>เครื่องจักร</th>
        <th class="right">รวมชิ้น</th><th>รับคืน</th><th></th>
      </tr></thead>
      <tbody>${tblRows}</tbody>
      <tfoot><tr>
        <td colspan="5" style="text-align:right;font-weight:700;background:#eff6ff">รวมทั้งสิ้น</td>
        <td class="right font-bold" style="background:#eff6ff">${totalItems}</td>
        <td style="color:#16a34a;font-weight:700;background:#eff6ff">${totalRets>0?'+'+totalRets+' คืน':''}</td>
        <td style="background:#eff6ff"></td>
      </tr></tfoot>
    </table></div>`;

  return `<div class="section"><div class="card">
    <div class="card-hdr">
      <span class="card-hdr-title">📋 ประวัติการจ่ายสินค้า${rows.length>0?' ('+rows.length+' ใบเบิก, '+totalItems+' ชิ้น)':''}</span>
      ${rows.length>0?`<div class="row gap-1">
        <button class="btn btn-sm btn-outline-blue" data-action="print-store-hist">🖨️ พิมพ์</button>
        <button class="btn btn-sm btn-outline-green" data-action="export-store-hist-xls">📥 Export XLS</button>
      </div>`:''}
    </div>
    <div style="padding:12px 16px">
      ${filterBar}
      ${rows.length>0?`<div class="info-box info-blue" style="margin-bottom:10px">
        พบ <strong>${rows.length}</strong> ใบเบิก | จ่ายออก <strong>${totalItems}</strong> ชิ้น | รับคืน <strong>${totalRets}</strong> ชิ้น | <strong style="color:#1d4ed8">สุทธิ ${totalItems-totalRets}</strong> ชิ้น
      </div>`:''}
      ${tableHtml}
    </div>
  </div></div>`;
}

function buildReportRows(ft,d,pc,fr,to){

    const job=S.jobs.find(j=>j.id===r.jobId);

      const p=S.parts.find(x=>x.id===it.partId);
      if(p) rows.push({isoDate:r.issuedAt||r.createdAt,dateDisp:fmtDT(r.issuedAt||r.createdAt),
        reqId:r.id,jobCode:job?.code||'—',machineType:job?.machineType||'',machineId:job?.machineId||'',
        custName:cust?.name||'',by:r.createdBy,dept:r.dept,
        partCode:p.code,partName:p.name,unit:p.unit,qty:it.qty,loc:it.location,
        photos:r.photos||[]});
    });
  });
  if(ft==='date'&&d) rows=rows.filter(r=>isoDay(r.isoDate)===d);
  else if(ft==='partCode'&&pc){const q=pc.toLowerCase();rows=rows.filter(r=>r.partCode.toLowerCase().includes(q)||r.partName.toLowerCase().includes(q));}
  else if(ft==='dateRange'&&(fr||to)) rows=rows.filter(r=>{const dd=isoDay(r.isoDate);if(fr&&dd<fr)return false;if(to&&dd>to)return false;return true;});
  rows.sort((a,b)=>b.isoDate.localeCompare(a.isoDate));
  return rows;
}

    const jobReqs=S.reqs.filter(r=>r.jobId===sel||(r.jobCode&&r.jobCode===job?.code));

            ${jRets.length>0?`<span class="text-xs text-gray">🔄 คืน <strong>${jRets.length}</strong> รายการ</span>`:''}
          </div>
        </div>
        <span style="color:#6b7280;font-size:18px">›</span>
      </div>`;
    }).join('');
  return `<div class="section"><div class="card">
    <div class="card-hdr">
      <span class="card-hdr-title">📁 Job ที่ปิดแล้ว (${closedJobs.length})</span>

}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function renderModal(){
  if(!S.modal) return '';
  const {type}=S.modal;
  if(type==='confirm-submit'){
    const {jobId,lines,note}=S.modal;
    const job=S.jobs.find(j=>j.id===jobId)||null;
    const cust=S.customers.find(c=>c.id===job?.customerId)||null;
    const jobDisplay=job?job.code:(jobId||'ไม่ระบุ Job');
    const warnings=lines.filter(l=>{const p=S.parts.find(x=>x.id===l.partId);return p&&l.qty>p.stock;});
    const rows=lines.map(l=>{const p=S.parts.find(x=>x.id===l.partId);const warn=p&&l.qty>p.stock;
      return `<tr${warn?' style="background:#fef2f2"':''}>

        <td>${warn?`<span style="color:#dc2626;font-size:11px;font-weight:700">⚠️ มีแค่ ${p.stock}</span>`:''}</td>
      </tr>`;}).join('');
    return `<div class="modal-backdrop"><div class="modal">

      </div>
    </div></div>`;
  }

    const {jobId}=S.modal;const job=S.jobs.find(j=>j.id===jobId);

      <div class="modal-title">🔒 ยืนยันปิดงาน</div>

      </div>
    </div></div>`;
  }
  if(type==='edit-job'){
    const {jobId}=S.modal;const job=S.jobs.find(j=>j.id===jobId);if(!job) return '';
    return `<div class="modal-backdrop"><div class="modal">
      <div class="modal-title">✏️ แก้ไขข้อมูลงาน</div>
      <div class="info-box info-blue" style="margin-bottom:12px">รหัส: <strong>${esc(job.code)}</strong> | สร้าง: ${fmtDT(job.createdAt)}<br><small style="color:#6b7280">รหัสงานและวันที่สร้างไม่สามารถแก้ไขได้</small></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div><label class="field-label">รายละเอียดงาน</label><input class="input" id="ej-desc" value="${esc(job.desc||'')}"></div>
        <div><label class="field-label">หมายเลขเครื่องจักร</label><input class="input input-mono" id="ej-machid" value="${esc(job.machineId||'')}"></div>
        <div><label class="field-label">ชนิดเครื่องจักร</label>
          <select class="input" id="ej-mtype"><option value="">— เลือกชนิด —</option>
            ${S.machineTypes.map(m=>`<option${job.machineType===m?' selected':''}>${esc(m)}</option>`).join('')}
          </select></div>
        <div><label class="field-label">ลูกค้า</label>
          <select class="input" id="ej-cust"><option value="">— ไม่ระบุ —</option>
            ${S.customers.map(c=>`<option value="${c.id}"${job.customerId===c.id?' selected':''}>${esc(c.name)}</option>`).join('')}
          </select></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="modal-cancel">ยกเลิก</button>
        <button class="btn btn-primary" data-action="do-edit-job" data-id="${jobId}">💾 บันทึก</button>
      </div>
    </div></div>`;
  }
  if(type==='return'){
    const {reqId}=S.modal;const req=S.reqs.find(r=>r.id===reqId);if(!req) return '';
    const opts=req.items.map(it=>{
      const p=S.parts.find(x=>x.id===it.partId);
      const pid=Number(it.partId)||it.partId;
      const existing=S.returns.find(r=>r.reqId===reqId&&(Number(r.partId)||r.partId)===pid&&r.status!=='rejected_return');
      const label=existing?`⚠️ ${esc(p?.name||'—')} — คืนแล้ว (${({pending_return:'รอผู้อนุมัติ',approved_return:'รอสโตร์รับ',completed_return:'รับคืนแล้ว'})[existing.status]||existing.status})`:
        `${esc(p?.name||'—')} (เบิกไป ${it.qty} ${esc(p?.unit||'')})`;
      return `<option value="${it.partId}"${existing?' disabled':''} style="${existing?'color:#9ca3af':''}">${label}</option>`;
    }).join('');
    return `<div class="modal-backdrop"><div class="modal">
      <div class="modal-title">🔄 แจ้งคืนสินค้า</div>
      <p class="text-sm text-gray" style="margin-bottom:12px">ใบเบิก ${esc(reqId)}</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div><label class="field-label">รายการที่คืน *</label><select class="input" id="ret-part">${opts}</select></div>
        <div><label class="field-label">จำนวนที่คืน *</label><input class="input" id="ret-qty" type="number" min="1" value="1"></div>
        <div><label class="field-label">ตำแหน่ง *</label><select class="input" id="ret-loc">${S.locations.map(l=>`<option>${esc(l)}</option>`).join('')}</select></div>
        <div><label class="field-label">เหตุผล * (บังคับ)</label><input class="input" id="ret-note" placeholder="เช่น เบิกเกิน / ผิดรุ่น / เสียหาย"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-action="modal-cancel">ยกเลิก</button>
        <button class="btn btn-orange" data-action="do-return" data-id="${reqId}">📤 ส่งคำขอคืน</button>
      </div>
    </div></div>`;
  }
  return '';
}

// ─── Page router + Render ─────────────────────────────────────────────────────
function renderPage(){
  const tabs=getTabs();const active=S.tab||tabs[0]?.key;
  switch(active){
    case 'adminstock': return renderAdminStock();
    case 'settings':   return renderSettings();
    case 'alljobs':    return renderJobs();
    case 'create':     return renderCreate();
    case 'myreqs':     return renderMyReqs();
    case 'pending':    return renderPending();
    case 'allreqs':    return renderAllReqs();
    case 'store':        return renderStore();
    case 'storehistory': return renderStoreHistory();
    case 'stock':        return (S.user?.role==='store')?renderStoreStock():renderUserStock();
    case 'returnlog':  return renderReturnLog();
    case 'myreturns':  return renderMyReturns();
    case 'returns':    return renderStoreReturns();
    case 'report':     return renderReport();
    default: return '<div class="section"><p style="color:#9ca3af">เลือกเมนูด้านบน</p></div>';
  }
}

function render(){
  const app=document.getElementById('app');if(!app) return;

  // บันทึก focus ก่อน re-render
  const focused=document.activeElement;
  let fi=null;
  if(focused && app.contains(focused)){
    fi={
      id:focused.id||'',
      action:focused.dataset.action||'',
      lid:focused.dataset.lid||'',
      ss:focused.selectionStart,
      se:focused.selectionEnd
    };
  }

  if(!S.user){app.innerHTML=renderLogin()+renderModal();return;}
  app.innerHTML=renderTopbar()+renderAlerts()+renderNav()+renderSummaryCards()
    +`<div class="page-wrap">${renderPage()}</div>`+renderModal();

  // คืน focus หลัง re-render
  if(fi){
    let el=null;
    if(fi.id) el=document.getElementById(fi.id);
    if(!el && fi.action && fi.lid)
      el=document.querySelector(`[data-action="${fi.action}"][data-lid="${fi.lid}"]`);
    if(el){
      el.focus();
      if(fi.ss!=null) try{ el.setSelectionRange(fi.ss,fi.se); }catch(_){}
    }
  }

  // เลื่อน nav ให้ tab ที่ active อยู่ในหน้าจอ
  const activeBtn=document.querySelector('.nav-btn.active');
  if(activeBtn) activeBtn.scrollIntoView({block:'nearest',inline:'nearest'});
}

// ─── EVENT DELEGATION ─────────────────────────────────────────────────────────
document.addEventListener('click', e => {
  // ปิด part-search dropdown เมื่อคลิกนอก
  if(S._lineDropOpen && !e.target.closest('.part-search-wrap')){
    S._lineDropOpen='';
    requestAnimationFrame(()=>render());
  }
  // ปิด dropdown เมื่อคลิกนอก
  if(S._stockStatusOpen && !e.target.closest('.sfw')){
    S._stockStatusOpen=false;
    requestAnimationFrame(()=>render());
  }
  if(S._jCustOpen && !e.target.closest('.sfw')){
    S._jCustOpen=false;
    requestAnimationFrame(()=>render());
  }
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const act = el.dataset.action;
  const val = el.dataset.val || '';
  const id  = el.dataset.id  || '';

  // Login
  if(act==='login-role')   { setState({_loginRole:val,_loginErr:null}); return; }
  if(act==='login-submit') { doLogin(); return; }
  if(act==='logout')       { setState({user:null,tab:null,_loginErr:null,_loginRole:'user',_loginAdminName:'',modal:null}); return; }

  // Nav
  if(act==='nav')          { setState({tab:val}); return; }

  // Alert (stock warning → navigate)
  if(act==='go-stock')     { setState({tab: S.user?.role==='admin'?'adminstock':'stock'}); return; }

  // Modal
  if(act==='modal-cancel') { setState({modal:null}); return; }

  // Settings tabs
  if(act==='settings-tab')    { setState({settingsTab:val}); return; }
  if(act==='admin-stock-tab') { setState({adminStockTab:val,_adjErr:null,_adjOk:null,_stockErr:null,_stockOk:null}); return; }

  // User mgmt
  if(act==='add-user')          { doAddUser(); return; }
  if(act==='toggle-user-status'){ doToggleUser(id); return; }
  if(act==='del-user')          { doDelUser(id); return; }

  // Master data
  if(act==='add-location')  { doAddLocation(); return; }
  if(act==='del-location')  { doDelLocation(el.dataset.idx); return; }
  if(act==='add-customer')  { doAddCustomer(); return; }
  if(act==='del-customer')  { doDelCustomer(id); return; }
  if(act==='add-machine')   { doAddMachine(); return; }
  if(act==='del-machine')   { doDelMachine(el.dataset.idx); return; }
  if(act==='save-company')  { doSaveCompany(); return; }

  // Customer machines
  if(act==='cm-expand')   { setState({expandedCustomer:S.expandedCustomer===id?null:id,_editCustMachId:null,_custMachErr:null}); return; }
  if(act==='cm-add')      { doAddCustomerMachine(id); return; }
  if(act==='cm-edit')     { setState({_editCustMachId:id+'__'+val,_custMachErr:null}); return; }
  if(act==='cm-save')     { doSaveCustomerMachine(id,val); return; }
  if(act==='cm-cancel')   { setState({_editCustMachId:null,_custMachErr:null}); return; }
  if(act==='cm-del')      { doDelCustomerMachine(id,val); return; }

  // Job form customer change
  if(act==='job-cust-change'){ setState({_jCustSel:el.value,_jMachId:''}); return; }
  if(act==='toggle-jcust'){ setState({_jCustOpen:!S._jCustOpen}); return; }
  if(act==='pick-jcust'){ setState({_jCustSel:el.dataset.val||'',_jCustOpen:false,_jMachId:''}); return; }

  // Admin stock
  if(act==='add-part')        { doAddPart(); return; }
  if(act==='edit-part')       { setState({_editPartId:id, _stockErr:null, _stockOk:null}); return; }
  if(act==='cancel-edit-part'){ setState({_editPartId:null}); return; }
  if(act==='del-part')         { doDelPart(id); return; }
  if(act==='save-edit-part')  { doSaveEditPart(id); return; }
  if(act==='adjust-stock')    { doAdjustStock(); return; }
  if(act==='do-adjust-stock')  { doAdjustStock(); return; }

  // Jobs
  if(act==='open-job')    { doOpenJob(); return; }
  if(act==='close-job'||act==='confirm-close-job'){ setState({modal:{type:'confirm-close-job',jobId:id}}); return; }
  if(act==='do-close-job'){ doCloseJob(id); return; }
  if(act==='reset-all-data'){ doResetAllData(); return; }
  if(act==='import-seed-parts'){ doImportSeedParts(); return; }
  if(act==='edit-job')    { const j=S.jobs.find(x=>x.id===id); if(j) setState({modal:{type:'edit-job',jobId:id,desc:j.desc}}); return; }
  if(act==='do-edit-job') { doEditJob(id); return; }
  if(act==='toggle-job'||act==='toggle-job-expand'){ const e2={...S.jobExpanded};e2[id]=!e2[id];setState({jobExpanded:e2}); return; }

  // Req card expand
  if(act==='toggle-expand'||act==='toggle-req'){ const e2={...S.expanded};e2[id]=!e2[id];setState({expanded:e2}); return; }
  if(act==='toggle-ret-req'){ const e2={...S.expanded};e2['ret_'+id]=!e2['ret_'+id];setState({expanded:e2}); return; }

  // Part search actions
  if(act==='select-part'){
    const pid=Number(el.dataset.pid)||el.dataset.pid;
    const lid=el.dataset.lid;
    const lines=S.createLines.map(l=>String(l.id)===String(lid)?{...l,partId:pid}:l);
    const ls={...S._lineSearch}; delete ls[lid];
    setState({createLines:lines,_lineSearch:ls,_lineDropOpen:''}); return;
  }
  if(act==='clear-part'){
    const lid=el.dataset.lid;
    const lines=S.createLines.map(l=>String(l.id)===String(lid)?{...l,partId:''}:l);
    const ls={...S._lineSearch}; ls[lid]='';
    setState({createLines:lines,_lineSearch:ls,_lineDropOpen:lid}); return;
  }
  if(act==='clear-part-search'){
    const lid=el.dataset.lid;
    const ls={...S._lineSearch}; ls[lid]='';
    setState({_lineSearch:ls,_lineDropOpen:''}); return;
  }

  // Create req
  if(act==='add-line'){
    const lines=[...S.createLines,{id:Date.now(),partId:'',qty:1,location:S.locations[0]||''}];
    setState({createLines:lines}); return;
  }
  if(act==='remove-line'||act==='del-line'){
    const lid=el.dataset.lid||id;
    if(S.createLines.length>1){ setState({createLines:S.createLines.filter(l=>String(l.id)!==lid)}); }
    return;
  }
  if(act==='confirm-submit'||act==='confirm-submit-req'){ doValidateCreate(); return; }
  if(act==='do-submit'||act==='do-submit-req'){ doSubmitReq(); return; }

  // Approver actions
  if(act==='approve-req')  { doApprove(id); return; }
  if(act==='reject-req')   { doReject(id); return; }

  // Store actions
  if(act==='store-tab')    { setState({storeTab:val}); return; }
  if(act==='job-tab')      { setState({jobTab:val}); return; }
  if(act==='acknowledge')  { doAcknowledge(id); return; }
  if(act==='issue-req'||act==='issue'){ doIssue(id); return; }

  // Return
  if(act==='open-return')    { setState({modal:{type:'return',reqId:id}}); return; }
  if(act==='do-return')      { doReturn(id); return; }
  if(act==='approve-return') { doApproveReturn(id); return; }
  if(act==='reject-return')  { doRejectReturn(id); return; }
  if(act==='receive-return') { doReceiveReturn(id); return; }

  // Pagination
  if(act==='page'){ const k=el.dataset.key; const v=Number(el.dataset.val)||0; setState({[k]:v}); return; }

  // Filters
  if(act==='filter-status'){ setState({filterStatus:val}); return; }
  if(act==='filter-job')   { setState({filterJob:val}); return; }
  if(act==='filter-stock-status'){ setState({filterStockStatus:val,stockPage:0,adminStockPage:0}); return; }
  if(act==='toggle-stock-filter'){ setState({_stockStatusOpen:!S._stockStatusOpen}); return; }
  if(act==='set-stock-filter')   { setState({filterStockStatus:val,stockPage:0,adminStockPage:0,_stockStatusOpen:false}); return; }
  if(act==='my-job-filter'){ setState({myJobFilter:val}); return; }

  // Store history
  if(act==='apply-store-hist')   { doApplyStoreHist(); return; }
  if(act==='toggle-sh')          { const e2={...S.expanded};e2['sh_'+id]=!e2['sh_'+id];setState({expanded:e2}); return; }
  if(act==='print-store-hist')   { doPrintStoreHist(); return; }
  if(act==='export-store-hist-xls'){ doExportStoreHistXLS(); return; }

  // Report
  if(act==='apply-report')       { doApplyReport(); return; }
  if(act==='rpt-type')           { setState({rptType:val}); return; }
  if(act==='rpt-mode')           { setState({rptMode:val,rptJobSel:null}); return; }
  if(act==='job-rpt-sel')        { setState({rptJobSel:id}); return; }
  if(act==='job-rpt-back')       { setState({rptJobSel:null}); return; }

  // Prints / exports
  if(act==='print-slip')         { doPrintSlip(id); return; }
  if(act==='view-photo'){
    const rid=el.dataset.rid, idx=Number(el.dataset.idx);
    const req=S.reqs.find(r=>r.id===rid);
    if(req?.photos?.[idx]){ const w=window.open(); w.document.write(`<img src="${req.photos[idx]}" style="max-width:100%">`); }
    return;
  }
  if(act==='print-slip-approver'||act==='approver-print-slip'){ doPrintSlipApprover(id); return; }
  if(act==='print-job')          { doPrintJob(id); return; }
  if(act==='export-job-xls')     { doExportJobXLS(id); return; }
  if(act==='print-report')       { doPrintReport(); return; }
  if(act==='export-report-xls')  { doExportReportXLS(); return; }
  if(act==='print-po-proposal')  { doPrintPOProposal(); return; }
  if(act==='print-job-report')   { doPrintJobReport(id||S.rptJobSel); return; }
  if(act==='export-job-report-xls'){ doExportJobReportXLS(id||S.rptJobSel); return; }
  if(act==='export-all-jobs-xls'){ doExportAllJobsXLS(); return; }
});

  if(el.id==='admin-stock-search') { setState({searchStock:el.value,adminStockPage:0}); return; }

  // Part search input — live filter
  if(act==='part-search-input'&&lid){
    const q=el.value;

    setState({_lineSearch:ls,_lineDropOpen:q.length>0?lid:''});

    // อัปเดต state โดยไม่ re-render เพื่อให้พิมพ์ได้ต่อเนื่อง
    S.createLines=S.createLines.map(l=>String(l.id)===lid?{...l,qty:el.value}:l);
    return;
  }
});

document.addEventListener('change', e => {
  const el = e.target;
  const act = el.dataset.action||'';
  const lid = el.dataset.lid||'';

  // อัปโหลดรูปและ compress ก่อนเก็บ
  if(act==='upload-photo'&&el.files[0]){
    const rid=el.dataset.rid;
    compressImage(el.files[0]).then(b64=>{
      const reqs=S.reqs.map(r=>{
        if(r.id!==rid) return r;
        const photos=[...(r.photos||[]),b64].slice(0,3);
        return {...r,photos};
      });
      setState({reqs});
    });
    el.value=''; return;
  }

  // Job customer select
  if(el.id==='j-cust'){ setState({_jCustSel:el.value,_jMachId:''}); return; }
  // line-part: update partId
  if(act==='line-part'&&lid){
    const lines=S.createLines.map(l=>String(l.id)===lid?{...l,partId:Number(el.value)||el.value}:l);
    setState({createLines:lines}); return;
  }
  // line-qty: update qty
  if(act==='line-qty'&&lid){
    const lines=S.createLines.map(l=>String(l.id)===lid?{...l,qty:Math.max(0,parseFloat(el.value)||0)}:l);
    setState({createLines:lines}); return;
  }
  // line-loc: update location
  if(act==='line-loc'&&lid){
    const lines=S.createLines.map(l=>String(l.id)===lid?{...l,location:el.value}:l);
    setState({createLines:lines}); return;
  }
  // Sync createLines (legacy lineField)
  if(el.dataset.lineField){
    const lineId = el.dataset.lineId;
    const field  = el.dataset.lineField;
    const lines  = S.createLines.map(l =>
      String(l.id)===lineId ? {...l, [field]: field==='qty'?Number(el.value)||1:el.value} : l
    );
    setState({createLines:lines});
  }
  // Store history filters (selects)
  if(act==='store-hist-ft')  { setState({storeHistFt:el.value}); return; }
  if(act==='store-hist-job') { setState({storeHistJob:el.value}); return; }
  // Report type select
  if(act==='filter-status')       { setState({filterStatus:el.value}); return; }
  if(act==='filter-job')          { setState({filterJob:el.value}); return; }
  if(act==='filter-stock-status') { setState({filterStockStatus:el.value,stockPage:0,adminStockPage:0}); return; }

function doLogin(){
  const role = S._loginRole;
  if(role==='admin'){
    const name = (document.getElementById('l-aname')?.value||'').trim();
    const pin  =  document.getElementById('l-apin') ?.value||'';
    if(!name){ setState({_loginErr:'กรุณาระบุชื่อผู้ดูแลระบบ'}); return; }
    if(pin!==ADMIN_PIN){ setState({_loginErr:'รหัส PIN ไม่ถูกต้อง'}); return; }
    setState({user:{id:'admin',name,role:'admin',dept:'',position:''},tab:'adminstock',_loginErr:null,_loginAdminName:name});
    requestNotifPerm(); _lastPendingN=-1; _lastApprovedN=-1;
    return;
  }
  const uid = document.getElementById('l-uid')?.value||'';
  const pin = document.getElementById('l-upin')?.value||'';
  if(!uid){ setState({_loginErr:'กรุณาเลือกชื่อผู้ใช้'}); return; }
  const u = S.users.find(x=>x.id===uid);
  if(!u){ setState({_loginErr:'ไม่พบบัญชีผู้ใช้'}); return; }
  if(u.status!=='active'){ setState({_loginErr:'บัญชีนี้ถูกระงับ'}); return; }
  if(u.pin!==pin){ setState({_loginErr:'รหัส PIN ไม่ถูกต้อง'}); return; }
  const defaultTabs={user:'create',approver:'pending',store:'store'};
  setState({user:{...u},tab:defaultTabs[u.role]||'create',_loginErr:null});
  requestNotifPerm(); _lastPendingN=-1; _lastApprovedN=-1;
}

function doAdjustStock(){
  const pId  = parseInt(document.getElementById('adj-part')?.value||'0',10);
  const type = document.getElementById('adj-type')?.value||'add';
  const qty  = parseInt(document.getElementById('adj-qty')?.value||'0',10);
  const note =(document.getElementById('adj-note')?.value||'').trim();
  if(!pId){ setState({_adjErr:'กรุณาเลือกสินค้า'}); return; }
  if(!note){ setState({_adjErr:'กรุณาระบุหมายเหตุ (บังคับ)'}); return; }
  if(isNaN(qty)||qty<0){ setState({_adjErr:'กรุณาระบุจำนวน'}); return; }
  if(type!=='set'&&qty===0){ setState({_adjErr:'จำนวนต้องมากกว่า 0'}); return; }
  const part=S.parts.find(p=>p.id===pId);
  if(!part){ setState({_adjErr:'ไม่พบสินค้า'}); return; }
  const prevStock=part.stock;
  let newStock,delta;
  if(type==='set'){ newStock=qty; delta=qty-prevStock; }
  else if(type==='add'){ newStock=prevStock+qty; delta=qty; }
  else { newStock=Math.max(0,prevStock-qty); delta=newStock-prevStock; }
  if(!confirm(`ยืนยันปรับสต็อก "${part.name}"\nจาก ${prevStock} → ${newStock} ${part.unit}\nหมายเหตุ: ${note}`)) return;
  const log={id:genId('LOG'),partId:pId,partCode:part.code,partName:part.name,prevStock,newStock,delta,type,note,by:S.user.name,at:nowISO()};
  const parts=S.parts.map(p=>p.id===pId?{...p,stock:newStock}:p);
  setState({parts,stockLog:[...S.stockLog,log],_adjErr:null,_adjOk:`✅ ปรับสต็อก "${part.name}" จาก ${prevStock} → ${newStock} ${part.unit}`,adminStockTab:'log'});
  document.getElementById('adj-note').value='';
  document.getElementById('adj-qty').value='';
}

function doIssue(id){
  const req=S.reqs.find(r=>r.id===id);
  if(!req) return;
  if(!req.photos||req.photos.length===0){
    setState({_issuePhotoErr:id});
    return;
  }
  // Deduct stock
  let parts=[...S.parts];
  for(const it of req.items){
    parts=parts.map(p=>{
      if(p.id===Number(it.partId)||p.id===it.partId) return {...p,stock:Math.max(0,p.stock-it.qty)};
      return p;
    });
  }
  const reqs=S.reqs.map(r=>r.id===id?{...r,status:'issued',issuedBy:S.user.name,issuedAt:nowISO()}:r);
  setState({reqs,parts});
}

function doReturn(reqId){
  const partId=document.getElementById('ret-part')?.value;
  const qty   =parseInt(document.getElementById('ret-qty') ?.value||'0',10);
  const loc   =document.getElementById('ret-loc') ?.value||'';
  const reason=(document.getElementById('ret-note')?.value||'').trim();
  if(!partId||qty<1){ alert('กรุณาเลือกสินค้าและจำนวนที่คืน'); return; }
  if(!reason){ alert('กรุณาระบุเหตุผลการคืน'); return; }
  // Block duplicate: same req + same part, with active/completed return already
  const pid=Number(partId)||partId;
  const existing=S.returns.find(r=>r.reqId===reqId&&(Number(r.partId)||r.partId)===pid&&r.status!=='rejected_return');
  if(existing){
    const st={pending_return:'รอผู้อนุมัติ',approved_return:'รอสโตร์รับ',completed_return:'รับคืนแล้ว'}[existing.status]||existing.status;
    alert(`รายการนี้มีคำขอคืนอยู่แล้ว (สถานะ: ${st})\nไม่สามารถแจ้งคืนซ้ำได้`);
    return;
  }
  const part=S.parts.find(p=>p.id===Number(partId)||p.id===partId);
  // Create PENDING return — stock NOT updated yet (will update when store receives)
  const ret={
    id:genId('RET'),reqId,partId:Number(partId)||partId,

function doRejectReturn(id){

function doReceiveReturn(id){

function getStoreHistRows(){
  const ft=S.storeHistFt||'all';
  const fDate=S.storeHistDate||'';
  const fFrom=S.storeHistFrom||'';
  const fTo  =S.storeHistTo  ||'';
  const fJob =S.storeHistJob ||'all';
  const fQ   =(S.storeHistQ  ||'').toLowerCase();
  let rows=S.reqs.filter(r=>r.status==='issued').slice().sort((a,b)=>(b.issuedAt||b.createdAt).localeCompare(a.issuedAt||a.createdAt));
  if(ft==='date' && fDate) rows=rows.filter(r=>isoDay(r.issuedAt||r.createdAt)===fDate);
  if(ft==='range'&&(fFrom||fTo)) rows=rows.filter(r=>{const d=isoDay(r.issuedAt||r.createdAt);if(fFrom&&d<fFrom)return false;if(fTo&&d>fTo)return false;return true;});
  if(fJob!=='all') rows=rows.filter(r=>r.jobId===fJob);
  if(fQ) rows=rows.filter(r=>{
    const job=S.jobs.find(j=>j.id===r.jobId);const cust=S.customers.find(c=>c.id===job?.customerId);
    return r.id.toLowerCase().includes(fQ)||(r.createdBy||'').toLowerCase().includes(fQ)||(job?.code||'').toLowerCase().includes(fQ)||(cust?.name||'').toLowerCase().includes(fQ)||r.items.some(it=>{const p=S.parts.find(x=>x.id===it.partId);return(p?.name||'').toLowerCase().includes(fQ)||(p?.code||'').toLowerCase().includes(fQ);});
  });
  return rows;
}

function doExportAllJobsXLS(){
  const closedJobs=S.jobs.filter(j=>j.status==='closed').sort((a,b)=>(b.closedAt||'').localeCompare(a.closedAt||''));
  if(!closedJobs.length){alert('ไม่มี Job ที่ปิดแล้ว');return;}
  let tbl=`<table>
    <tr><th colspan="12" style="font-size:14px;background:#1d4ed8;color:#fff">สรุปรายงาน Job ทั้งหมด — ${esc(S.companyName||'')} | ${fmtDT(nowISO())}</th></tr>
    <tr style="background:#dbeafe">
      <th>Job Code</th><th>รายละเอียด</th><th>ลูกค้า</th><th>เครื่องจักร</th><th>รหัสเครื่อง</th>
      <th>วันเปิด</th><th>วันปิด</th>
      <th>ใบเบิกทั้งหมด</th><th>จ่ายสำเร็จ</th><th>ชิ้นที่จ่าย</th><th>คืนแล้ว</th><th>สุทธิ</th>
    </tr>`;
  closedJobs.forEach(j=>{
    const cust=S.customers.find(c=>c.id===j.customerId);
    const jReqs=S.reqs.filter(r=>r.jobId===j.id);
    const issued=jReqs.filter(r=>r.status==='issued');
    const jRets=S.returns.filter(r=>jReqs.some(rq=>rq.id===r.reqId)&&r.status==='completed_return');
    const out=issued.reduce((s,r)=>s+r.items.reduce((ss,it)=>ss+it.qty,0),0);
    const ret=jRets.reduce((s,r)=>s+r.qty,0);
    tbl+=`<tr><td>${esc(j.code)}</td><td>${esc(j.desc||'')}</td><td>${esc(cust?.name||'')}</td>
      <td>${esc(j.machineType||'')}</td><td>${esc(j.machineId||'')}</td>

      <td>${jReqs.length}</td><td>${issued.length}</td><td>${out}</td><td>${ret}</td><td>${out-ret}</td></tr>`;
  });
  tbl+='</table>';
  downloadXLS(`Job-Summary-${new Date().toISOString().slice(0,10)}.xls`,tbl);
}

        1. เปิด console.firebase.google.com<br>
        2. สร้าง Project (ฟรี)<br>
        3. Project Settings → Your apps → Add Web App<br>
        4. Realtime Database → Create database → Test mode<br>
        5. Copy firebaseConfig มาวางในโค้ด
      </div>
    </div>`;
    return;
  }

  const dbRef=firebase.database().ref('appdata');

  // ครั้งแรก: ถ้า Firebase ว่างอยู่ให้ seed ข้อมูลเริ่มต้น
  dbRef.once('value').then(snap=>{
    if(!snap.exists()){
      const seed={};
      DB_KEYS.forEach(k=>{ seed[k]=S[k]||[]; });
      return dbRef.set(seed);
    }
  }).then(()=>{
    // ฟังการเปลี่ยนแปลง real-time จาก Firebase
    dbRef.on('value',snap=>{
      const data=snap.val();
      if(data){
        DB_KEYS.forEach(k=>{ if(data[k]!==undefined) S[k]=data[k]; });
      }
      render();
      checkNotify();
    });
  }).catch(err=>{
    appEl.innerHTML=`<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#dc2626,#9b1c1c);gap:12px;padding:32px;text-align:center">
      <div style="font-size:48px">❌</div>
      <div style="color:#fff;font-weight:800;font-size:20px">ไม่สามารถเชื่อมต่อ Firebase ได้</div>
      <div style="color:#fca5a5;font-size:13px;max-width:400px">${err.message}</div>
      <div style="color:#fde68a;font-size:12px">กรุณาตรวจสอบ Firebase Config และ Realtime Database Rules</div>
    </div>`;
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initFirebase();
</script>
</body>
</html>
